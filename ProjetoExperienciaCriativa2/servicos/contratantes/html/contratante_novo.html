<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - ConsertaJá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f4fff7 0%, #eef7ff 100%);
            display: flex;
            flex-direction: column;
        }

        .navbar {
            border-bottom: 1px solid #e9ecef;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }

        .service-card {
            width: 100%;
            max-width: 650px;
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            background: #fff;
        }

        .service-card .card-header-custom {
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            color: white;
            padding: 32px 28px 24px;
        }

        .service-card .card-header-custom h2 {
            margin: 0;
            font-weight: 700;
        }

        .service-card .card-header-custom p {
            margin: 8px 0 0;
            opacity: 0.92;
        }

        .service-card .card-body {
            padding: 30px 28px;
        }

        .form-label {
            font-weight: 600;
            color: #2f3a3f;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select,
        textarea {
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid #d9e2e7;
            transition: all 0.2s ease;
            box-shadow: none !important;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.18rem rgba(25, 135, 84, 0.15) !important;
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .input-group-text {
            border-radius: 14px 0 0 14px;
            background-color: #f8f9fa;
            border: 1px solid #d9e2e7;
        }

        .input-group .form-control {
            border-radius: 0 14px 14px 0;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #198754;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 18px;
        }

        .btn-custom-success {
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            border: none;
            border-radius: 14px;
            padding: 12px 18px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .btn-custom-danger {
            border-radius: 14px;
            padding: 12px 18px;
            font-weight: 600;
        }

        .icon-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 14px;
        }

        @media (max-width: 576px) {
            .service-card .card-header-custom,
            .service-card .card-body {
                padding-left: 20px;
                padding-right: 20px;
            }

            .btn-group-responsive {
                flex-direction: column;
            }

            .btn-group-responsive .btn {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">
                <i class="bi bi-tools me-1"></i> ConsertaJá
            </a>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="card service-card">
            <div class="card-header-custom">
                <div class="icon-circle">
                    <i class="bi bi-briefcase"></i>
                </div>
                <h2>Novo Serviço</h2>
                <p>Preencha as informações abaixo para cadastrar um novo serviço na plataforma.</p>
            </div>

            <div class="card-body">
                <div class="section-title">Informações do serviço</div>

                <div class="mb-3">
                    <label for="nome" class="form-label">Nome do Serviço</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Instalação elétrica residencial">
                </div>

                <div class="mb-3">
                    <label for="descricao" class="form-label">Descrição</label>
                    <textarea id="descricao" class="form-control" placeholder="Descreva o serviço oferecido, experiência, prazo, diferenciais..."></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="tipo" class="form-label">Categoria</label>
                        <select id="tipo" class="form-select">
                            <option value="" selected disabled>Selecione uma categoria</option>
                            <option value="Eletrica">Elétrica</option>
                            <option value="Limpeza">Limpeza</option>
                            <option value="Informatica">Informática</option>
                            <option value="Pintura">Pintura</option>
                            <option value="Encanamento">Encanamento</option>
                            <option value="Montagem">Montagem</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="valor" class="form-label">Valor</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" step="0.01" id="valor" class="form-control" placeholder="150.00">
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="localidade" class="form-label">Localidade</label>
                    <input type="text" id="localidade" class="form-control" placeholder="Ex: Curitiba - PR">
                </div>

                <div class="d-flex justify-content-between gap-2 btn-group-responsive">
                    <button id="enviar" class="btn btn-custom-success text-white w-50">
                        <i class="bi bi-check-circle me-1"></i> Cadastrar
                    </button>
                    <button id="voltar" class="btn btn-outline-danger btn-custom-danger w-50">
                        <i class="bi bi-arrow-left me-1"></i> Voltar
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3">
        <p class="mb-0 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/contratante_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
