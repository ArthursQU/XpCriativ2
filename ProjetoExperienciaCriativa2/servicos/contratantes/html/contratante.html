<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f4fff7 0%, #eef7ff 100%);
            min-height: 100vh;
        }

        .page-title {
            font-weight: 700;
            color: #198754;
        }

        .service-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            height: 100%;
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.12);
        }

        .service-badge {
            background: #e9f7ef;
            color: #198754;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .service-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #198754;
        }

        .empty-state {
            border: 2px dashed #cfd8dc;
            border-radius: 18px;
            background: #fff;
            padding: 40px 20px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
            <ul class="navbar-nav w-100 d-flex justify-content-between align-items-center">
                <div class="d-flex">
                    <li class="nav-item">
                        <a class="nav-link text-secondary fw-semibold" href="../../../home/html/index.html">Home</a>
                    </li>
                    <div class="dropdown">
                        <button type="button" class="nav-link text-secondary fw-semibold dropdown-toggle" data-bs-toggle="dropdown">
                            Serviços
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="../../prestadores/html/prestador.html">Oferecendo</a></li>
                            <li><a class="dropdown-item" href="../html/contratante.html">Contratando</a></li>
                        </ul>
                    </div>
                </div>
                <li class="nav-item">
                    <button class="btn btn-danger px-3 fw-semibold" id="logoff">Sair</button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h2 class="page-title mb-1">Serviços Cadastrados</h2>
                <p class="text-muted mb-0">Gerencie os serviços oferecidos na plataforma.</p>
            </div>
            <button id="novo" class="btn btn-success fw-semibold px-4">
                <i class="bi bi-plus-circle me-1"></i> Novo Serviço
            </button>
        </div>

        <div id="lista" class="row g-4"></div>
    </main>

    <footer class="bg-white border-top py-3 text-center mt-5">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
        <div>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-facebook"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-instagram"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-linkedin"></i></a>
        </div>
    </footer>

    <script src="../../home/js/logoff.js"></script>
    <script src="../js/contratante.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
