<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f4fff7 0%, #eef7ff 100%);
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            color: #fff;
            padding: 28px 26px 22px;
        }

        .login-body {
            padding: 28px 26px;
            background: #fff;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px 14px;
        }

        .btn-main {
            border-radius: 14px;
            font-weight: 600;
            padding: 12px 16px;
        }
    </style>
</head>
<body>
    <nav class="navbar bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h2 class="fw-bold mb-2">Entrar</h2>
                <p class="mb-0">Acesse sua conta para continuar na plataforma.</p>
            </div>

            <div class="login-body">
                <div class="mb-3">
                    <label for="usuario" class="form-label fw-semibold">Usuário</label>
                    <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário">
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label fw-semibold">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                </div>

                <div class="d-grid gap-2">
                    <button id="enviar" class="btn btn-success btn-main">Entrar</button>
                    <button id="novo" class="btn btn-outline-warning btn-main">Criar conta</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 bg-white border-top">
        <p class="mb-0 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/login.js"></script>
</body>
</html>
