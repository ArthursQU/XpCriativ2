<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f4fff7 0%, #eef7ff 100%);
            min-height: 100vh;
        }

        .profile-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="../html/index.html">ConsertaJá</a>

            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-outline-success" href="../html/index.html">Home</a>
                <button class="btn btn-danger" id="logoff">Sair</button>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="card profile-card p-4">
            <div class="card-body">
                <h2 class="fw-bold text-success mb-4">Meu Perfil</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nome</label>
                        <input type="text" id="perfil_nome" class="form-control" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Usuário</label>
                        <input type="text" id="perfil_usuario" class="form-control" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="text" id="perfil_email" class="form-control" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Telefone</label>
                        <input type="text" id="perfil_telefone" class="form-control" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Tipo de conta</label>
                        <input type="text" id="perfil_tipo" class="form-control" readonly>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-3 text-center">
        <p class="mb-0 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/logoff.js"></script>
    <script src="../js/valida_sessao.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await valida_sessao();

            try {
                const retorno = await fetch("../php/usuario_get.php?perfil=1");
                const resposta = await retorno.json();

                if (resposta.status === "ok" && resposta.data.length > 0) {
                    const usuario = resposta.data[0];
                    document.getElementById("perfil_nome").value = usuario.nome ?? "";
                    document.getElementById("perfil_usuario").value = usuario.usuario ?? "";
                    document.getElementById("perfil_email").value = usuario.email ?? "";
                    document.getElementById("perfil_telefone").value = usuario.telefone ?? "";
                    document.getElementById("perfil_tipo").value = usuario.tipo ?? "";
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>
</html>
