<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f4fff7 0%, #eef7ff 100%);
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .register-card {
            width: 100%;
            max-width: 650px;
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            color: white;
            padding: 28px 26px 22px;
        }

        .register-body {
            background: white;
            padding: 28px 26px;
        }

        .form-control, .form-select {
            border-radius: 14px;
            padding: 12px 14px;
        }

        .btn-main {
            border-radius: 14px;
            font-weight: 600;
            padding: 12px 16px;
        }
    </style>
</head>
<body>
    <nav class="navbar bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="card register-card">
            <div class="register-header">
                <h2 class="fw-bold mb-2">Criar Conta</h2>
                <p class="mb-0">Cadastre-se para entrar na plataforma e acessar os serviços.</p>
            </div>

            <div class="register-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nome" class="form-label fw-semibold">Nome</label>
                        <input type="text" id="nome" class="form-control" placeholder="Seu nome completo">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="usuario" class="form-label fw-semibold">Usuário</label>
                        <input type="text" id="usuario" class="form-control" placeholder="Escolha um usuário">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label fw-semibold">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="seuemail@email.com">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label fw-semibold">Telefone</label>
                        <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="senha" class="form-label fw-semibold">Senha</label>
                        <input type="password" id="senha" class="form-control" placeholder="Crie uma senha">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="tipo" class="form-label fw-semibold">Tipo de conta</label>
                        <select id="tipo" class="form-select">
                            <option value="contratante">Contratante</option>
                            <option value="prestador">Prestador</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                    <button id="enviar" class="btn btn-success btn-main w-100">Cadastrar</button>
                    <button id="voltar" class="btn btn-outline-danger btn-main w-100">Voltar</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 bg-white border-top">
        <p class="mb-0 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/cadastro_novo.js"></script>
</body>
</html>
