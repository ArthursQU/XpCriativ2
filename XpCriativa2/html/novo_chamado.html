<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Chamado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="max-width: 500px; width: 100%; border-radius: 15px;">
        <h3 class="fw-bold text-success text-center mb-4">Abrir Novo Chamado</h3>
        
        <form id="form-dados">
            <input type="hidden" name="origem" id="origem" value="chamado">

            <div class="mb-3"><input type="text" name="nome" class="form-control" placeholder="O que você precisa? (Ex: Conserto de Pia)" required></div>
            <div class="mb-3"><textarea name="descricao" class="form-control" placeholder="Descreva o problema com detalhes..." required></textarea></div>
            
            <div class="row">
                <div class="col-6 mb-3">
                    <select name="tipo" class="form-select" required>
                        <option value="Limpeza">Limpeza</option>
                        <option value="Eletrica">Elétrica</option>
                        <option value="Encanamento">Encanamento</option>
                        <option value="Montagem">Montagem</option>
                    </select>
                </div>
                <div class="col-6 mb-3"><input type="number" step="0.01" name="valor" class="form-control" placeholder="Orçamento Base (R$)" required></div>
            </div>

            <div class="mb-3"><input type="text" name="localidade" class="form-control" placeholder="Onde o serviço será feito?" required></div>
            <div class="mb-4">
                <label class="form-label text-muted small">Foto do problema (opcional)</label>
                <input type="file" name="foto" class="form-control" accept="image/*">
            </div>
        </form>

        <div class="d-flex gap-2">
            <button id="enviar" class="btn btn-success w-50 fw-bold">Publicar Chamado</button>
            <a href="contratante.html" class="btn btn-outline-danger w-50 fw-bold">Voltar</a>
        </div>
    </div>

    <script src="../js/navbar_inteligente.js"></script>
    <script src="../js/form_servicos.js"></script>
</body>
</html>
